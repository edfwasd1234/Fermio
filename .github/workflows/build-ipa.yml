name: Build Unsigned IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest' # Automatically picks the latest Xcode supporting Swift 6.2 / iOS 26+

      - name: Setup Homebrew and Install xtool
        run: |
          brew install xtool-org/tap/xtool

      - name: Setup Darwin SDK for xtool
        run: |
          xtool setup

      - name: Compile and Package Unsigned IPA
        run: |
          xtool dev build --ipa --configuration release

      - name: Locate and Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fremio-unsigned-ipa
          path: "**/*.ipa"
          if-no-files-found: error
