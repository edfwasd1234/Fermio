<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fremio WCO.tv Test Client</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0b071e, #130a2a, #1a0f3c);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
      --glass-glow: rgba(147, 51, 234, 0.2);
      --primary: #c084fc;
      --secondary: #22d3ee;
      --text: #f3e8ff;
      --text-muted: #a78bfa;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      padding: 30px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px var(--glass-glow);
      margin-bottom: 10px;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* Glassmorphic Card */
    .glass-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      padding: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }

    /* Search Section */
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .search-box input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px 20px;
      color: #fff;
      font-size: 1.1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(192, 132, 252, 0.3);
    }

    .search-box button {
      background: linear-gradient(135deg, var(--primary), #a855f7);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 0 32px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(192, 132, 252, 0.4);
    }

    .search-box button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(192, 132, 252, 0.6);
    }

    /* Media Grid Layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .media-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .media-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--primary);
      box-shadow: 0 12px 30px rgba(192, 132, 252, 0.2);
    }

    .media-card .cover {
      width: 100%;
      height: 250px;
      object-fit: cover;
      background: #110c24;
    }

    .media-card .info {
      padding: 12px;
    }

    .media-card .title {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Video & Episode Layout */
    .player-section {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      margin-top: 30px;
    }

    @media (max-width: 900px) {
      .player-section {
        grid-template-columns: 1fr;
      }
    }

    .video-container {
      position: relative;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
    }

    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .player-details {
      margin-top: 15px;
    }

    .player-details h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .controls-row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .pill-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      border-radius: 12px;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .pill-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .pill-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 0 10px rgba(192, 132, 252, 0.4);
    }

    /* Episode List Column */
    .episodes-list {
      max-height: 500px;
      overflow-y: auto;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 16px;
    }

    .episodes-list h3 {
      font-size: 1.2rem;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
    }

    .ep-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid transparent;
    }

    .ep-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .ep-item.active {
      background: rgba(192, 132, 252, 0.15);
      border-color: var(--primary);
    }

    .ep-badge {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 8px;
      font-weight: 600;
    }

    .badge-sub {
      background: rgba(34, 211, 238, 0.2);
      color: var(--secondary);
    }

    .badge-dub {
      background: rgba(192, 132, 252, 0.2);
      color: var(--primary);
    }

    /* Loading Spinner */
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: var(--primary);
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Fremio WCO.tv</h1>
      <p>Test anime resolver, list episodes, toggle sub/dub & play streams</p>
    </header>

    <!-- Search Card -->
    <div class="glass-card">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search anime title (e.g. Naruto, Cyberpunk, Demon Slayer)..." onkeydown="if(event.key === 'Enter') search()">
        <button onclick="search()">Search</button>
      </div>
      <div id="loadingSearch" style="display: none;">
        <div class="spinner"></div>
      </div>
      <div id="mediaGrid" class="grid"></div>
    </div>

    <!-- Player & Episode List Grid -->
    <div class="player-section" id="playerSection" style="display: none;">
      <div>
        <div class="video-container">
          <video id="mainPlayer" controls></video>
        </div>
        <div class="player-details">
          <h2 id="nowPlayingTitle">Select an episode</h2>
          <div class="controls-row">
            <div>
              <span style="font-size: 0.9rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Dialogue Mode</span>
              <button class="pill-btn active" id="langSubBtn" onclick="toggleLanguage('Subbed')">Subbed</button>
              <button class="pill-btn" id="langDubBtn" onclick="toggleLanguage('Dubbed')">Dubbed</button>
            </div>
            <div>
              <span style="font-size: 0.9rem; color: var(--text-muted); display: block; margin-bottom: 4px;">Quality Option</span>
              <div id="qualityContainer" style="display: flex; gap: 8px;"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Episode Drawer -->
      <div class="episodes-list">
        <h3>Episodes</h3>
        <div id="loadingEpisodes" style="display: none;">
          <div class="spinner"></div>
        </div>
        <div id="episodesContainer"></div>
      </div>
    </div>
  </div>

  <script>
    let activeEpisodes = [];
    let currentEpisodeIndex = 0;
    let selectedLanguage = 'Subbed';
    let currentStreams = [];

    async function search() {
      const q = document.getElementById('searchInput').value;
      if (!q) return;

      document.getElementById('loadingSearch').style.display = 'block';
      document.getElementById('mediaGrid').innerHTML = '';

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const items = await res.json();
        
        document.getElementById('loadingSearch').style.display = 'none';

        if (items.length === 0) {
          document.getElementById('mediaGrid').innerHTML = '<p style="text-align: center; color: var(--text-muted);">No anime found.</p>';
          return;
        }

        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'media-card';
          card.onclick = () => loadShow(item);
          card.innerHTML = `
            <img class="cover" src="${item.cover || 'https://images.unsplash.com/photo-1578632767115-351597cf2477?w=300'}" alt="${item.title}">
            <div class="info">
              <div class="title" title="${item.title}">${item.title}</div>
            </div>
          `;
          document.getElementById('mediaGrid').appendChild(card);
        });
      } catch(e) {
        document.getElementById('loadingSearch').style.display = 'none';
        alert('Search error: ' + e.message);
      }
    }

    async function loadShow(show) {
      document.getElementById('playerSection').style.display = 'grid';
      document.getElementById('loadingEpisodes').style.display = 'block';
      document.getElementById('episodesContainer').innerHTML = '';
      
      try {
        const res = await fetch(`/api/episodes?id=${encodeURIComponent(show.id)}`);
        activeEpisodes = await res.json();
        
        document.getElementById('loadingEpisodes').style.display = 'none';
        renderEpisodes();
        
        // Play first episode automatically
        if (activeEpisodes.length > 0) {
          playEpisode(0);
        }
      } catch(e) {
        document.getElementById('loadingEpisodes').style.display = 'none';
        alert('Failed to load episodes: ' + e.message);
      }
    }

    function renderEpisodes() {
      const container = document.getElementById('episodesContainer');
      container.innerHTML = '';

      // Filter episodes by selected language
      const filtered = activeEpisodes.filter(ep => ep.type === selectedLanguage);
      
      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">No episodes in this language option.</p>';
        return;
      }

      filtered.forEach((ep, index) => {
        const isCurrent = activeEpisodes[currentEpisodeIndex]?.id === ep.id;
        const item = document.createElement('div');
        item.className = `ep-item ${isCurrent ? 'active' : ''}`;
        item.onclick = () => {
          // find global index
          const globalIdx = activeEpisodes.findIndex(e => e.id === ep.id);
          playEpisode(globalIdx);
        };
        item.innerHTML = `
          <span>Ep ${ep.number} - ${ep.title.replace(/\(Subbed\)|\(Dubbed\)/i, '')}</span>
          <span class="ep-badge ${ep.type === 'Dubbed' ? 'badge-dub' : 'badge-sub'}">${ep.type}</span>
        `;
        container.appendChild(item);
      });
    }

    async function playEpisode(index) {
      currentEpisodeIndex = index;
      renderEpisodes();
      
      const ep = activeEpisodes[index];
      document.getElementById('nowPlayingTitle').textContent = `Ep ${ep.number} - ${ep.title}`;
      
      const player = document.getElementById('mainPlayer');
      player.pause();
      player.removeAttribute('src');
      player.load();

      // Show loaders on quality buttons
      document.getElementById('qualityContainer').innerHTML = '<span style="color: var(--text-muted);">Fetching links...</span>';

      try {
        const res = await fetch(`/api/streams?id=${encodeURIComponent(ep.id)}`);
        currentStreams = await res.json();
        
        if (currentStreams.length === 0) {
          document.getElementById('qualityContainer').innerHTML = '<span style="color: #ef4444;">No streams found.</span>';
          return;
        }

        renderQualities();
        // Play highest quality
        loadStream(currentStreams[0]);
      } catch(e) {
        document.getElementById('qualityContainer').innerHTML = '<span style="color: #ef4444;">Resolution error.</span>';
      }
    }

    function renderQualities() {
      const container = document.getElementById('qualityContainer');
      container.innerHTML = '';

      currentStreams.forEach(stream => {
        const btn = document.createElement('button');
        btn.className = 'pill-btn';
        btn.textContent = stream.label;
        btn.onclick = () => {
          // Clear active sibling
          Array.from(container.children).forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          loadStream(stream);
        };
        container.appendChild(btn);
      });
      
      if (container.children.length > 0) {
        container.children[0].classList.add('active');
      }
    }

    function loadStream(stream) {
      const player = document.getElementById('mainPlayer');
      // Use the local server proxy to stream the media file with the required referer headers
      const proxyUrl = `/api/proxy?url=${encodeURIComponent(stream.url)}&referer=${encodeURIComponent(stream.referer)}`;
      player.src = proxyUrl;
      player.load();
      player.play().catch(e => console.log('Autoplay blocked:', e));
    }

    function toggleLanguage(lang) {
      selectedLanguage = lang;
      
      document.getElementById('langSubBtn').classList.toggle('active', lang === 'Subbed');
      document.getElementById('langDubBtn').classList.toggle('active', lang === 'Dubbed');

      // Re-render and play corresponding episode index
      renderEpisodes();
      
      // Attempt to play the same episode number in the new language if available
      const currentEp = activeEpisodes[currentEpisodeIndex];
      if (currentEp) {
        const targetEp = activeEpisodes.find(ep => ep.number === currentEp.number && ep.type === lang);
        if (targetEp) {
          const idx = activeEpisodes.indexOf(targetEp);
          playEpisode(idx);
        } else {
          // Play first episode in this language category
          const firstInLang = activeEpisodes.find(ep => ep.type === lang);
          if (firstInLang) {
            const idx = activeEpisodes.indexOf(firstInLang);
            playEpisode(idx);
          }
        }
      }
    }
  </script>
</body>
</html>
